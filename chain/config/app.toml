###############################################################################
###                         Energy Chain - app.toml                         ###
###############################################################################

###############################################################################
###                           Base Configuration                            ###
###############################################################################

minimum-gas-prices = "0.025uecy"

pruning = "default"

# pruning-keep-recent, pruning-interval are used with custom pruning
pruning-keep-recent = "0"
pruning-interval = "0"

halt-height = 0
halt-time = 0

min-retain-blocks = 0

inter-block-cache = true

index-events = []

iavl-cache-size = 781250

iavl-disable-fastnode = false

iavl-lazy-loading = false

app-db-backend = ""

###############################################################################
###                         Telemetry Configuration                         ###
###############################################################################

[telemetry]

service-name = ""

enabled = false

enable-hostname = false
enable-hostname-label = false
enable-service-label = false

prometheus-retention-time = 0

global-labels = []

###############################################################################
###                           API Configuration                             ###
###############################################################################

[api]

enable = true

swagger = true

address = "tcp://0.0.0.0:1317"

max-open-connections = 1000

rpc-read-timeout = 10
rpc-write-timeout = 0

rpc-max-body-bytes = 1000000

enabled-unsafe-cors = true

###############################################################################
###                          gRPC Configuration                             ###
###############################################################################

[grpc]

enable = true

address = "0.0.0.0:9090"

max-recv-msg-size = "10485760"
max-send-msg-size = "2147483647"

###############################################################################
###                        gRPC Web Configuration                           ###
###############################################################################

[grpc-web]

enable = true

address = "0.0.0.0:9091"

enable-unsafe-cors = true

###############################################################################
###                        State Sync Configuration                         ###
###############################################################################

[state-sync]

snapshot-interval = 0

snapshot-keep-recent = 2

###############################################################################
###                         JSON-RPC Configuration                          ###
###############################################################################

[json-rpc]

enable = true

address = "0.0.0.0:8545"

ws-address = "0.0.0.0:8546"

api = "eth,txpool,personal,net,debug,web3"

gas-cap = 25000000

evm-timeout = "5s"

txfee-cap = 1

filter-cap = 200

feehistory-cap = 100

logs-cap = 10000

block-range-cap = 10000

http-timeout = "30s"
http-idle-timeout = "120s"

allow-unprotected-txs = false

max-open-connections = 0

enable-indexer = false

metrics-address = "0.0.0.0:6065"

###############################################################################
###                            TLS Configuration                            ###
###############################################################################

[tls]

certificate-path = ""
key-path = ""

###############################################################################
###                          Rosetta Configuration                          ###
###############################################################################

[rosetta]

enable = false

address = ":8080"

blockchain = "energychain"
network = "energychain_9001-1"

retries = 3

offline = false
