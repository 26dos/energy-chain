name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  chain-build-test:
    name: Chain Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: chain/go.mod
          cache-dependency-path: chain/go.sum

      - name: Build
        working-directory: chain
        run: go build ./...

      - name: Vet
        working-directory: chain
        run: go vet ./...

      - name: Test
        working-directory: chain
        run: go test ./... -v -count=1 -race

  contracts-build-test:
    name: Contracts Compile & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install
        working-directory: contracts
        run: npm ci

      - name: Compile
        working-directory: contracts
        run: npx hardhat compile

      - name: Test
        working-directory: contracts
        run: npx hardhat test

  cli-lint:
    name: CLI Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install
        working-directory: cli
        run: npm ci

      - name: Check syntax
        working-directory: cli
        run: node --check bin/energy-cli.js

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: chain-build-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t energychain:ci chain/
