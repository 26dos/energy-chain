version: "3.9"

services:
  energychain-node:
    build:
      context: ../chain
      dockerfile: Dockerfile
    container_name: energychain-node
    ports:
      - "26656:26656"  # P2P
      - "26657:26657"  # CometBFT RPC
      - "1317:1317"    # Cosmos REST API
      - "8545:8545"    # EVM JSON-RPC HTTP
      - "8546:8546"    # EVM JSON-RPC WS
      - "9090:9090"    # gRPC
    volumes:
      - node-data:/root/.energychaind
    command: >
      start
      --home /root/.energychaind
      --json-rpc.api eth,txpool,personal,net,debug,web3
      --minimum-gas-prices=10000000000uecy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: energychain-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - energychain-node
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: energychain-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: energychain-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  node-data:
  prometheus-data:
  grafana-data:
