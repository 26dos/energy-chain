events {
    worker_connections 1024;
}

http {
    upstream rpc_backend {
        server energychain-node:26657;
    }

    upstream api_backend {
        server energychain-node:1317;
    }

    upstream evm_backend {
        server energychain-node:8545;
    }

    upstream grpc_backend {
        server energychain-node:9090;
    }

    server {
        listen 80;
        server_name _;

        # CometBFT RPC
        location /rpc/ {
            proxy_pass http://rpc_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Cosmos REST API
        location /api/ {
            proxy_pass http://api_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # EVM JSON-RPC
        location /evm/ {
            proxy_pass http://evm_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Content-Type application/json;
        }

        # Health check
        location /health {
            proxy_pass http://rpc_backend/health;
        }
    }
}
