version: '3.9'

services:
  blockscout-db:
    image: postgres:16-alpine
    container_name: blockscout-db
    environment:
      POSTGRES_DB: blockscout
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: blockscout_secret_pw
    volumes:
      - blockscout-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  blockscout-redis:
    image: redis:7-alpine
    container_name: blockscout-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  blockscout-backend:
    image: blockscout/blockscout:latest
    container_name: blockscout-backend
    depends_on:
      blockscout-db:
        condition: service_healthy
      blockscout-redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://blockscout:blockscout_secret_pw@blockscout-db:5432/blockscout
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: ${EVM_HTTP_URL:-http://host.docker.internal:8545}
      ETHEREUM_JSONRPC_WS_URL: ${EVM_WS_URL:-ws://host.docker.internal:8546}
      ETHEREUM_JSONRPC_TRACE_URL: ${EVM_HTTP_URL:-http://host.docker.internal:8545}
      CHAIN_ID: "262144"
      COIN: ECY
      COIN_NAME: "Energy Chain Yield"
      NETWORK: "EnergyChain"
      SUBNETWORK: "Testnet"
      BLOCKSCOUT_HOST: 0.0.0.0
      PORT: 4000
      SECRET_KEY_BASE: "RMgI4C1HSkxsEjdhtGMfwAHfyT6CKWXOgzCboJflfSm4jeAlic52io05KB6mqzc5"
      ACCOUNT_ENABLED: "false"
      BLOCK_TRANSFORMER: base
      CACHE_ADDRESS_WITH_BALANCES_UPDATE_INTERVAL: 30s
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      FETCH_REWARDS_WAY: trace
      DISABLE_EXCHANGE_RATES: "true"
      DISABLE_KNOWN_TOKENS: "true"
      POOL_SIZE: 40
      POOL_SIZE_API: 10
      ECTO_USE_SSL: "false"
      ACCOUNT_REDIS_URL: redis://blockscout-redis:6379
      MIX_ENV: prod
      API_V2_ENABLED: "true"
      MICROSERVICE_SC_VERIFIER_ENABLED: "true"
      MICROSERVICE_SC_VERIFIER_URL: http://blockscout-verifier:8043
    command: ["sh", "-c", "bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' && bin/blockscout start"]
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  blockscout-frontend:
    image: ghcr.io/blockscout/frontend:latest
    container_name: blockscout-frontend
    depends_on:
      - blockscout-backend
    environment:
      NEXT_PUBLIC_APP_HOST: localhost
      NEXT_PUBLIC_APP_PORT: "3001"
      NEXT_PUBLIC_APP_PROTOCOL: http
      NEXT_PUBLIC_API_HOST: localhost
      NEXT_PUBLIC_API_PORT: "4000"
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws
      NEXT_PUBLIC_NETWORK_NAME: "EnergyChain"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "ECY"
      NEXT_PUBLIC_NETWORK_ID: "262144"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: "ECY"
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: "ECY"
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
      NEXT_PUBLIC_IS_TESTNET: "true"
      NEXT_PUBLIC_API_BASE_PATH: /
    ports:
      - "3001:3000"
    restart: unless-stopped

  blockscout-verifier:
    image: ghcr.io/blockscout/smart-contract-verifier:latest
    container_name: blockscout-verifier
    environment:
      SMART_CONTRACT_VERIFIER__SERVER__HTTP__ADDR: 0.0.0.0:8043
    ports:
      - "8043:8043"
    restart: unless-stopped

volumes:
  blockscout-db-data:
