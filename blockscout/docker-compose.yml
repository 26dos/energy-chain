services:
  blockscout-db:
    image: postgres:16-alpine
    container_name: blockscout-db
    environment:
      POSTGRES_DB: blockscout
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: blockscout_secret_pw
    volumes:
      - blockscout-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  blockscout-redis:
    image: redis:7-alpine
    container_name: blockscout-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  blockscout-backend:
    image: ghcr.io/blockscout/blockscout:latest
    container_name: blockscout-backend
    depends_on:
      blockscout-db:
        condition: service_healthy
      blockscout-redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://blockscout:blockscout_secret_pw@blockscout-db:5432/blockscout
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: ${EVM_HTTP_URL:-http://host.docker.internal:8575}
      ETHEREUM_JSONRPC_WS_URL: ${EVM_WS_URL:-ws://host.docker.internal:8576}
      ETHEREUM_JSONRPC_TRACE_URL: ${EVM_HTTP_URL:-http://host.docker.internal:8575}
      CHAIN_ID: "262144"
      COIN: ECY
      COIN_NAME: "Energy Chain Yield"
      NETWORK: "EnergyChain"
      SUBNETWORK: "Testnet"
      BLOCKSCOUT_HOST: 0.0.0.0
      PORT: 4000
      SECRET_KEY_BASE: "RMgI4C1HSkxsEjdhtGMfwAHfyT6CKWXOgzCboJflfSm4jeAlic52io05KB6mqzc5"
      ACCOUNT_ENABLED: "false"
      BLOCK_TRANSFORMER: base
      CACHE_ADDRESS_WITH_BALANCES_UPDATE_INTERVAL: 30s
      FIRST_BLOCK: "1"
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
      INDEXER_CATCHUP_BLOCKS_BATCH_SIZE: "50"
      FETCH_REWARDS_WAY: trace
      DISABLE_EXCHANGE_RATES: "true"
      DISABLE_KNOWN_TOKENS: "true"
      DISABLE_MARKET: "true"
      POOL_SIZE: 40
      POOL_SIZE_API: 10
      ECTO_USE_SSL: "false"
      ACCOUNT_REDIS_URL: redis://blockscout-redis:6379
      MIX_ENV: prod
      API_V2_ENABLED: "true"
      MICROSERVICE_SC_VERIFIER_ENABLED: "true"
      MICROSERVICE_SC_VERIFIER_URL: http://blockscout-verifier:8043
    command: ["sh", "-c", "bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' && bin/blockscout start"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  blockscout-frontend:
    image: ghcr.io/blockscout/frontend:latest
    container_name: blockscout-frontend
    depends_on:
      - blockscout-backend
    environment:
      NEXT_PUBLIC_API_HOST: localhost
      NEXT_PUBLIC_API_PORT: "3001"
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws
      NEXT_PUBLIC_APP_HOST: localhost
      NEXT_PUBLIC_APP_PORT: "3001"
      NEXT_PUBLIC_APP_PROTOCOL: http
      NEXT_PUBLIC_STATS_API_HOST: http://localhost:8080
      NEXT_PUBLIC_NETWORK_NAME: "EnergyChain"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "ECY"
      NEXT_PUBLIC_NETWORK_ID: "262144"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: "ECY"
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: "ECY"
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
      NEXT_PUBLIC_IS_TESTNET: "true"
      NEXT_PUBLIC_API_BASE_PATH: /
      NEXT_PUBLIC_GAS_TRACKER_ENABLED: "true"
      NEXT_PUBLIC_API_SPEC_URL: https://raw.githubusercontent.com/blockscout/blockscout-api-v2-swagger/main/swagger.yaml
    restart: unless-stopped

  blockscout-verifier:
    image: ghcr.io/blockscout/smart-contract-verifier:latest
    container_name: blockscout-verifier
    environment:
      SMART_CONTRACT_VERIFIER__SERVER__HTTP__ADDR: 0.0.0.0:8043
    restart: unless-stopped

  stats-db:
    image: postgres:16-alpine
    container_name: stats-db
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: stats_secret_pw
    volumes:
      - stats-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stats -d stats"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  stats:
    image: ghcr.io/blockscout/stats:latest
    container_name: stats
    depends_on:
      stats-db:
        condition: service_healthy
      blockscout-backend:
        condition: service_started
    environment:
      STATS__SERVER__HTTP__ENABLED: "true"
      STATS__SERVER__HTTP__ADDR: 0.0.0.0:8050
      STATS__DB_URL: postgres://stats:stats_secret_pw@stats-db:5432/stats
      STATS__BLOCKSCOUT_DB_URL: postgresql://blockscout:blockscout_secret_pw@blockscout-db:5432/blockscout
      STATS__CREATE_DATABASE: "true"
      STATS__RUN_MIGRATIONS: "true"
      STATS__FORCE_UPDATE_ON_START: "true"
      STATS__BLOCKSCOUT_API_URL: http://blockscout-backend:4000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  blockscout-proxy:
    image: nginx:alpine
    container_name: blockscout-proxy
    depends_on:
      - blockscout-backend
      - blockscout-frontend
    volumes:
      - "./proxy:/etc/nginx/templates"
    environment:
      BACK_PROXY_PASS: http://blockscout-backend:4000
      FRONT_PROXY_PASS: http://blockscout-frontend:3000
    ports:
      - "3001:80"
      - "8080:8080"
    restart: unless-stopped

volumes:
  blockscout-db-data:
  stats-db-data:
